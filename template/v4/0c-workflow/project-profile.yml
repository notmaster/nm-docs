project:
  type: generic
  package_manager: npm

verify:
  command: ./0d-scripts/verify.sh
  required_profiles:
    - common

profiles:
  common:
    checks:
      - lint
      - test
      - build
  docs:
    checks:
      - markdown-lint
      - link-check
  web:
    checks:
      - lint
      - typecheck
      - test
      - build
      - e2e-smoke
  backend:
    checks:
      - lint
      - test
      - api-smoke
      - migration-check
  cli:
    checks:
      - command-smoke
      - help
      - version
  mobile:
    checks:
      - build
      - smoke
  desktop:
    checks:
      - build
      - startup-smoke

notifications:
  feishu:
    recommended: true
    config: ~/.config/nm-docs/nm-notify-feishu.env
